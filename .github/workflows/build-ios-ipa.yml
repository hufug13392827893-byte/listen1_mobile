name: Build iOS IPA (for TrollStore)
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Use npm mirror for faster downloads
        run: npm config set registry https://registry.npmmirror.com && npm config set strict-ssl false

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps --no-audit --no-fund --loglevel=warn

      - name: Pre-build third-party deps for RN 0.62 on Xcode 16
        run: |
          # RN 0.62.3's third-party deps (glog) fail on Xcode 16 because
          # iOS Simulator runtime is not bundled on macOS 15 Sequoia.
          # Fix: install the runtime OR skip the broken configure check.
          GLOG_DIR=node_modules/react-native/third-party/glog-0.3.5
          if [ -d "$GLOG_DIR" ]; then
            echo "Patching glog configure to skip broken iOS simulator check..."
            cd "$GLOG_DIR"
            # Save original configure, modify to always pass iOS compiler check
            cp configure configure.bak
            # Replace the arm-apple-darwin check to also accept arm64-apple-ios
            sed -i '' 's/arm-apple-darwin/arm64-apple-ios|arm-apple-darwin/g' configure
            echo "glog patched"
            cd ../../../..
          fi

      - name: Build iOS Project (Unsigned for TrollStore)
        run: |
          cd ios
          xcodebuild -project Listen1.xcodeproj \
            -scheme Listen1 \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Listen1.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (Unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/build/Listen1.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Listen1-iOS-IPA
          path: output/Listen1.ipa
          retention-days: 7
