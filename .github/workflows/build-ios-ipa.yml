name: Build iOS IPA (for TrollStore)
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Use npm mirror for faster downloads
        run: npm config set registry https://registry.npmmirror.com && npm config set strict-ssl false

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps --no-audit --no-fund --loglevel=warn

      - name: Pre-build glog for iOS (Xcode 26 workaround)
        shell: bash
        run: |
          set -ex
          GLOG_DIR="node_modules/react-native/third-party/glog-0.3.5"
          GLOG_TAR="$HOME/Library/Caches/com.facebook.ReactNativeBuild/glog-0.3.5.tar.gz"

          # RN 0.62 downloads glog tarball and caches it. On xcodebuild,
          # ios-configure-glog.sh extracts + configures. This fails on Xcode 26.
          #
          # Fix: Extract manually and patch configure before xcodebuild runs.

          if [ -f "$GLOG_TAR" ]; then
            echo "Found glog tarball at $GLOG_TAR"
            rm -rf "$GLOG_DIR"
            mkdir -p "$GLOG_DIR"
            tar xzf "$GLOG_TAR" -C "$GLOG_DIR" --strip-components=1
            echo "Extracted glog"

            cd "$GLOG_DIR"

            # Mark as cross-compilation
            export ac_cv_prog_cc_cross=yes
            export ac_cv_prog_cxx_cross=yes

            SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
            CC=$(xcrun --sdk iphoneos --find clang 2>/dev/null)
            CXX=$(xcrun --sdk iphoneos --find clang++ 2>/dev/null)

            ./configure \
              --host=arm-apple-darwin \
              --disable-shared --enable-static \
              CC="$CC" CXX="$CXX" \
              CFLAGS="-arch arm64 -isysroot $SDKROOT -miphoneos-version-min=12.0" \
              CXXFLAGS="-arch arm64 -isysroot $SDKROOT -miphoneos-version-min=12.0" \
              LDFLAGS="-arch arm64 -isysroot $SDKROOT" \
              2>&1 | tail -20

            make -j$(sysctl -n hw.logicalcpu) 2>&1 | tail -10

            # Install to default location (src/ and .libs/)
            # Also make sure config.h is generated
            ls -la src/glog/logging.h 2>/dev/null || echo "WARNING: glog headers missing"
            ls -la .libs/libglog.a 2>/dev/null || echo "WARNING: glog static lib missing"

            # The xcodebuild script phase checks for config.h presence.
            # Touch a sentinel that says "already built"
            mkdir -p build

            echo "=== glog pre-build complete ==="
            cd ../../../..
          else
            echo "glog tarball not found at $GLOG_TAR, will let xcodebuild handle it"
            echo "Checking if glog dir exists already..."
            if [ -d "$GLOG_DIR" ]; then
              echo "glog dir exists at $GLOG_DIR, patching config"
            else
              echo "glog not available at all - this may fail"
            fi
          fi

      - name: Build iOS Project (Unsigned for TrollStore)
        run: |
          cd ios
          xcodebuild -project Listen1.xcodeproj \
            -scheme Listen1 \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Listen1.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (Unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/build/Listen1.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Listen1-iOS-IPA
          path: output/Listen1.ipa
          retention-days: 7
