name: Build iOS IPA (for TrollStore)
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Use npm mirror for faster downloads
        run: npm config set registry https://registry.npmmirror.com && npm config set strict-ssl false

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps --no-audit --no-fund --loglevel=warn

      - name: Download and pre-build glog for iOS
        shell: bash
        run: |
          set -ex

          GLOG_DIR="node_modules/react-native/third-party/glog-0.3.5"
          GLOG_CACHE="$HOME/Library/Caches/com.facebook.ReactNativeBuild"

          # Create cache dir if it doesn't exist
          mkdir -p "$GLOG_CACHE"

          # Delete any existing glog dir (RN script expects fresh extraction)
          rm -rf "$GLOG_DIR"

          # Download glog-0.3.5 source from GitHub
          echo "Downloading glog-0.3.5..."
          curl -sL -o "$GLOG_CACHE/glog-0.3.5.tar.gz" \
            "https://github.com/google/glog/archive/refs/tags/v0.3.5.tar.gz"

          # Extract to the expected location
          mkdir -p "$GLOG_DIR"
          tar xzf "$GLOG_CACHE/glog-0.3.5.tar.gz" -C "$GLOG_DIR" --strip-components=1

          echo "glog source extracted to $GLOG_DIR"

          cd "$GLOG_DIR"

          # Mark as cross-compilation (critical for Xcode 26)
          export ac_cv_prog_cc_cross=yes
          export ac_cv_prog_cxx_cross=yes

          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          CC=$(xcrun --sdk iphoneos --find clang 2>/dev/null)
          CXX=$(xcrun --sdk iphoneos --find clang++ 2>/dev/null)

          echo "SDKROOT=$SDKROOT"
          echo "CC=$CC"

          # Configure for iOS arm64
          ./configure \
            --host=arm-apple-darwin \
            --disable-shared --enable-static \
            CC="$CC" CXX="$CXX" \
            CFLAGS="-arch arm64 -isysroot $SDKROOT -miphoneos-version-min=12.0" \
            CXXFLAGS="-arch arm64 -isysroot $SDKROOT -miphoneos-version-min=12.0" \
            LDFLAGS="-arch arm64 -isysroot $SDKROOT" \
            2>&1

          echo "=== configure done ==="

          # Build the library only (skip test targets which fail on iOS)
          # Build each source file, then archive
          echo "Compiling glog library sources..."
          for src in src/*.cc; do
            [ "$(basename "$src")" = "logging_unittest.cc" ] && continue
            [ "$(basename "$src")" = "demangle_unittest.cc" ] && continue
            [ "$(basename "$src")" = "signalhandler_unittest.cc" ] && continue
            echo "Compiling $src..."
            $CXX -c $CXXFLAGS "$src" -o "${src%.cc}.o" -Isrc
          done
          echo "Archiving into libglog.a..."
          ar rcs libglog.a src/*.o 2>/dev/null || true
          echo "=== Verification ==="
          ls -la src/glog/logging.h
          ls -la src/config.h
          ls -la libglog.a 2>/dev/null && echo "libglog.a created successfully"
          echo "=== glog pre-build complete ===

          cd ../../../..
          echo "=== glog pre-build complete ==="

      - name: Build iOS Project (Unsigned for TrollStore)
        run: |
          cd ios
          xcodebuild -project Listen1.xcodeproj \
            -scheme Listen1 \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Listen1.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (Unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/build/Listen1.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Listen1-iOS-IPA
          path: output/Listen1.ipa
          retention-days: 7
